{extend name="main/main" /}
{block name="main"}
<!--职员-->
<link rel="stylesheet" href="/skin/css/main/public_class.css" type="text/css" media="all" />
<div class="operation">
    <div class="so layui-form layui-form-pane">
    		<table>
    			<tr>
    				<td>
    					<input type="text" class="layui-input" id="so|name" placeholder="职员名称" >
    				</td>
    				<td>
    					<input type="text" class="layui-input" id="so|user" placeholder="职员账号" >
    				</td>
					<td>
    					 <input type="text" class="layui-input" id="so|data" placeholder="职员备注" >
    				</td>
    				<td class="re_left">
    				    <button class="layui-btn layui-btn-primary" onclick="so()" style="margin:0"><i class="layui-icon">&#xe615;</i></button>
    		        </td>
				</tr>
    		</table>
    </div>
    <div class="set">
        <button class="layui-btn layui-btn-warm" onclick="re();">刷新</button>
        {if condition="(check_root('senior_add'))"}
            <button class="layui-btn layui-btn-normal"  onclick="user_info();">新增</button>
        {/if}
    </div>
    <div style="clear: both;"></div>
</div>
<hr />
<table id="ape_table"></table>
<script type="text/javascript" charset="utf-8">
    var root_del={if condition="(check_root('senior_del'))"}true{else /}false{/if};
    var root_edit={if condition="(check_root('senior_edit'))"}true{else /}false{/if};
</script>
<script src="/skin/js/main/user.js" type="text/javascript" charset="utf-8"></script>
{/block}
